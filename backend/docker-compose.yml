version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: clam_redis
    ports:
      - "6379:6379"

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clam_clickhouse
    environment:
      - CLICKHOUSE_DB=clam_db
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ports:
      - "8123:8123"
      - "9000:9000"